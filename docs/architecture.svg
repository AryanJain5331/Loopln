<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">LoopIn architecture</title>
  <desc id="desc">LoopIn takes a student profile, searches opportunity sources, ranks signals, synthesizes senior-friend cards, and returns source-linked next actions.</desc>
  <defs>
    <style>
      .bg{fill:#f3f0e8}.paper{fill:#fbfaf5;stroke:#bdc3bb;stroke-width:2}.dark{fill:#1d4f3d}.box{fill:#fff;stroke:#b7beb8;stroke-width:2}.lime{fill:#c9ff67}.orange{fill:#ff6b3d}
      .title{font:700 35px Arial,sans-serif;fill:#14231d}.sub{font:400 17px Arial,sans-serif;fill:#66706b}.label{font:700 18px Arial,sans-serif;fill:#14231d}.small{font:400 14px Arial,sans-serif;fill:#66706b}.white{font:700 18px Arial,sans-serif;fill:#fff}.wsmall{font:400 14px Arial,sans-serif;fill:#d6ded8}.chip{font:700 12px Arial,sans-serif;fill:#1d4f3d}
      .arrow{stroke:#1d4f3d;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#1d4f3d"/></marker>
  </defs>
  <rect class="bg" width="1400" height="820"/>
  <text class="title" x="70" y="65">LoopIn · AI Senior Friend Architecture</text>
  <text class="sub" x="70" y="96">Profile-aware opportunity intelligence for students without strong senior networks</text>

  <rect class="paper" x="60" y="150" rx="22" width="250" height="520"/>
  <text class="label" x="92" y="195">Input Layer</text>
  <rect class="box" x="92" y="235" rx="14" width="185" height="120"/>
  <text class="label" x="114" y="272">Student profile</text>
  <text class="small" x="114" y="300">Year, stack, goals</text>
  <text class="small" x="114" y="322">Interests, location</text>
  <rect class="box" x="92" y="405" rx="14" width="185" height="120"/>
  <text class="label" x="114" y="442">React UI</text>
  <text class="small" x="114" y="470">Onboarding form</text>
  <text class="small" x="114" y="492">Reasoning trace</text>

  <path class="arrow" d="M310 410 H365"/>

  <rect class="dark" x="365" y="150" rx="22" width="665" height="520"/>
  <text class="white" x="405" y="195">Reasoning Layer · Microsoft Foundry IQ Path</text>
  <text class="wsmall" x="405" y="220">Search → filter → score → synthesize → verify</text>

  <rect class="box" x="405" y="260" rx="13" width="170" height="115"/>
  <text class="label" x="430" y="296">1. Profile Intake</text>
  <text class="small" x="430" y="324">Normalize context</text>
  <text class="small" x="430" y="346">Avoid sensitive data</text>

  <path class="arrow" d="M575 318 H600"/>
  <rect class="box" x="600" y="260" rx="13" width="170" height="115"/>
  <text class="label" x="625" y="296">2. Search</text>
  <text class="small" x="625" y="324">Hackathons, jobs</text>
  <text class="small" x="625" y="346">Tools, news, Learn</text>

  <path class="arrow" d="M770 318 H795"/>
  <rect class="box" x="795" y="260" rx="13" width="190" height="115"/>
  <text class="label" x="820" y="296">3. Rank</text>
  <text class="small" x="820" y="324">Urgency + fit</text>
  <text class="small" x="820" y="346">Actionability score</text>

  <path class="arrow" d="M890 375 V425"/>
  <rect class="box" x="665" y="425" rx="13" width="320" height="115"/>
  <text class="label" x="690" y="462">4. Senior-Friend Synthesis</text>
  <text class="small" x="690" y="490">Why it matters to YOU</text>
  <text class="small" x="690" y="512">Clear next action</text>

  <path class="arrow" d="M665 482 H575"/>
  <rect class="box" x="405" y="425" rx="13" width="170" height="115"/>
  <text class="label" x="430" y="462">5. Verify</text>
  <text class="small" x="430" y="490">Source links</text>
  <text class="small" x="430" y="512">Deadline caution</text>

  <rect class="lime" x="405" y="585" rx="14" width="580" height="55"/>
  <text class="label" x="432" y="620">Structured brief: 5-7 source-linked cards</text>

  <path class="arrow" d="M1030 410 H1085"/>
  <rect class="paper" x="1085" y="150" rx="22" width="255" height="520"/>
  <text class="label" x="1118" y="195">Output Layer</text>
  <rect class="box" x="1118" y="245" rx="14" width="185" height="115"/>
  <text class="label" x="1140" y="282">Personalized feed</text>
  <text class="small" x="1140" y="310">Cards by relevance</text>
  <text class="small" x="1140" y="332">Filter by category</text>
  <rect class="box" x="1118" y="405" rx="14" width="185" height="115"/>
  <text class="label" x="1140" y="442">Deep dive</text>
  <text class="small" x="1140" y="470">Source proof</text>
  <text class="small" x="1140" y="492">Next action</text>
  <rect class="orange" x="1118" y="565" rx="14" width="185" height="55"/>
  <text x="1140" y="599" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#fff">Student acts faster</text>

  <text class="chip" x="70" y="735">Safety: no login, no stored history, source-linked claims, verify deadlines before acting.</text>
</svg>
